name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install dependencies
        run: bun install

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: verify secrets
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then echo "❌ RAILWAY_TOKEN not set"; exit 1; fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then echo "❌ RAILWAY_PROJECT_ID not set"; exit 1; fi
          echo "✅ All secrets loaded"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: deploy to railway
        run: bunx @railway/cli up --service kharcha-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
